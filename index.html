<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>anti-aviator</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-icon" aria-hidden="true">
            <span class="brand-icon-frame">
              <img src="./anti-aviator-logo.svg" alt="" />
            </span>
          </span>
          <h1>anti-aviator</h1>
        </div>
        <div class="stream-strip" aria-live="polite">
          <span id="streamLabel">Live airspace</span>
          <span id="phaseBadge" class="phase-badge">Streaming</span>
          <span id="timerLabel">Altitude 50</span>
        </div>
        <div class="balance-box">
          <span>Balance</span>
          <strong id="balanceLabel">$1000</strong>
        </div>
      </header>

      <main class="game-layout">
        <section class="control-panel" aria-label="Bet controls">
          <div class="panel-heading">
            <p class="eyebrow">hangar</p>
            <h2>Launch Bet</h2>
          </div>

          <label class="field">
            <span>Callsign</span>
            <input id="usernameInput" type="text" maxlength="18" autocomplete="off" autocapitalize="characters" />
          </label>

          <div class="stake-row">
            <label class="field">
              <span>Stake</span>
              <input id="stakeInput" type="number" min="1" max="300" step="1" inputmode="numeric" />
            </label>
            <div class="axis-pair stake-summary">
              <span id="stakeTimeLabel">ETA 20s</span>
              <span id="stakeCreditLabel">$0</span>
            </div>
          </div>

          <div class="altitude-row">
            <label class="field">
              <span>Altitude ticks</span>
              <input id="altitudeInput" type="number" min="1" max="100" step="1" inputmode="numeric" />
            </label>
            <div class="stake-meter">
              <input id="altitudeRange" type="range" min="1" max="100" step="1" />
              <div class="axis-pair">
                <span id="altitudeTickLabel">0 ticks</span>
                <span id="altitudeLimitLabel">max 100</span>
              </div>
            </div>
          </div>

          <dl class="quote-grid">
            <div>
              <dt>Derived payout</dt>
              <dd id="payoutLabel">-</dd>
            </div>
            <div>
              <dt>Win chance</dt>
              <dd id="chanceLabel">-</dd>
            </div>
            <div>
              <dt>Return</dt>
              <dd id="returnLabel">-</dd>
            </div>
          </dl>

          <button id="placeBetButton" class="primary-action" type="button">Launch Plane</button>
          <button id="resetBalanceButton" class="secondary-action" type="button">Reset Balance</button>
          <p id="betMessage" class="status-line" aria-live="polite"></p>
        </section>

        <section class="chart-panel" aria-label="Anti-aircraft chart">
          <div class="canvas-frame">
            <canvas id="gameCanvas"></canvas>
          </div>
        </section>

        <aside class="right-rail" aria-label="Traffic details">
          <section class="panel-block">
            <div class="panel-heading compact">
              <p class="eyebrow">live traffic</p>
              <h2>Planes</h2>
            </div>
            <div id="playerList" class="player-list"></div>
          </section>

          <section class="panel-block">
            <div class="panel-heading compact">
              <p class="eyebrow">inspection</p>
              <h2>Selected Plane</h2>
            </div>
            <div id="inspector" class="inspector"></div>
          </section>

          <section class="panel-block">
            <div class="panel-heading compact">
              <p class="eyebrow">recent</p>
              <h2>My Runs</h2>
            </div>
            <div id="historyList" class="history-list"></div>
          </section>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
